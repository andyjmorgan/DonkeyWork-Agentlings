name: my-agentling
description: A helpful AI assistant

tools:
  - bash
  - filesystem
  - memory

skills:
  - id: general
    name: General Assistant
    description: Answer questions and help with tasks
    tags: [general, assistant]

system_prompt: |
  You are a helpful AI assistant.

  Use the tools available to you to accomplish tasks. When a tool returns output,
  incorporate it into your response.

  Be concise. Use code blocks for command output.

# bash_timeout: 50            # default per-command bash timeout (seconds)
# max_tool_result_chars: 32000  # cap a single tool result before it's truncated
#                               # (with a marker) on its way back to the model.
#                               # Stops a runaway tool (e.g. recursive grep over
#                               # large files) from blowing the request body past
#                               # the API size limit and failing the turn with a
#                               # 413. Set 0 to disable truncation.

memory:
  token_budget: 2000
  # injection_prompt: null  # override the memory injection template

sleep:
  enabled: true             # set false for backends without batches API (e.g. Ollama)
  schedule: "0 2 * * *"
  journal_retention_days: 30
  conversation_retention_days: 14
  memory_max_entries: 50
  # model: null             # override model for sleep LLM calls
  # summary_prompt: null    # override per-conversation summary prompt
  # consolidation_prompt: null  # override REM consolidation prompt

thinking:
  # Extended thinking. Off by default.
  #
  # mode: "off" (default) — no thinking block sent.
  # mode: "adaptive" — Opus 4.6+ / Sonnet 4.6+ shape. The model picks
  #   its own thinking budget; control depth with `effort`. Interleaved
  #   thinking between tool calls is automatic in this mode.
  # mode: "budget" — legacy shape, supported on Sonnet 3.7,
  #   Sonnet 4 / 4.5, Opus 4 / 4.1 / 4.5, and Haiku 4.5. Set
  #   `interleaved: true` to think between tool calls (requires the
  #   model to support the interleaved-thinking-2025-05-14 beta;
  #   Haiku 4.5 does NOT).
  mode: "off"
  # effort: "medium"     # adaptive only: low | medium | high | xhigh | max
  # display: "summarized"  # adaptive only: opts back into summarized thinking content on Opus 4.7+
  # budget_tokens: 8192    # budget only: must be >= 1024 (and < max_tokens unless interleaved)
  # interleaved: false     # budget only: adds the interleaved-thinking-2025-05-14 beta header

telemetry:
  # Off by default. When enabled, the agent emits OTLP traces + metrics
  # for every HTTP request, protocol call, task, LLM call, tool, and
  # journal write. See README "OpenTelemetry" for the full span/metric
  # surface. Override at runtime via AGENT_OTEL_ENDPOINT (and friends).
  enabled: false
  endpoint: "http://localhost:4318"   # OTLP collector base URL
  protocol: "http"                    # "http" or "grpc"
  service_name: "agentling"
  insecure: true                      # disable TLS for collector connection
  # headers:
  #   Authorization: "Bearer your-token"
